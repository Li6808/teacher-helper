<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#c62828" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="教师助手" />
    <link rel="manifest" href="./manifest.json" />
    <link rel="apple-touch-icon" href="./icons/icon-192x192.png" />
    <title>教师个人助手</title>
    <style>
      [class*="kimi"],[class*="Kimi"],[id*="kimi"],[id*="Kimi"],
      .kimi-agent,.kimi-chat,.kimi-button,.kimi-fab,.kimi-float,.kimi-widget,
      [data-testid*="kimi"],iframe[src*="kimi"]{
        display:none!important;visibility:hidden!important;opacity:0!important;
        pointer-events:none!important;width:0!important;height:0!important;
        position:fixed!important;top:-9999px!important;left:-9999px!important;
        z-index:-9999!important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if('serviceWorker' in navigator){
        window.addEventListener('load',()=>{
          navigator.serviceWorker.register('./sw.js')
            .then(r=>console.log('SW:',r.scope))
            .catch(e=>console.log('SW err:',e));
        });
      }
    </script>
  </body>
</html>
